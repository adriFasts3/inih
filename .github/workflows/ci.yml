name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install build tools
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y cmake ninja-build
          else
            brew install cmake ninja
          fi

      # Drive the build through the Makefile wrapper, which delegates to CMake.
      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Build examples
        run: make EXAMPLES=1 examples

      - name: Dist tarball
        run: make dist
